<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Valiant Guardian Ministries</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:#f2f2f2;

      /* Background image */
      background-image:url("bg-haven.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
    }

    /* Dark overlay so text stays readable */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.72);
      pointer-events:none;
      z-index:-1;
    }

    /* Center everything on the page */
    .wrap{
      min-height:100vh;
      display:flex;
      justify-content:center;   /* horizontal center */
      align-items:center;       /* vertical center */
      padding:26px;
      box-sizing:border-box;
    }

    /* Main card container (what you want centered) */
    .container{
      width:100%;
      max-width:1000px;
      text-align:center;
      border:2px solid #2a2a2f;
      border-radius:18px;
      background:#111114;
      padding:26px;
      box-sizing:border-box;
    }

    h1{
      margin:10px 0 6px;
      letter-spacing:1px;
      font-size:40px;
    }

    .subtitle{
      color:#bdbdbd;
      margin:0 0 22px;
    }

    /* Nav buttons centered */
    .nav{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:15px;
      margin-top:18px;
    }

    .nav a{
      border:2px solid #2a2a2f;
      padding:16px 18px;
      border-radius:14px;
      text-decoration:none;
      color:#f2f2f2;
      background:#0f0f12;
      font-weight:bold;
      min-width:160px;
      text-align:center;
      box-sizing:border-box;
    }

    .nav a:hover{
      border-color:#f2f2f2;
    }

    footer{
      margin-top:22px;
      font-size:12px;
      color:#888;
    }

    /* Logo styling */
    .logo{
      width:120px;
      margin-bottom:14px;
      opacity:0.95;
      display:inline-block;
    }

    @media (max-width:600px){
      body{background-attachment:scroll;}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="container">

      <img class="logo" src="logo1.png" alt="Valiant Guardian Ministries Logo">

      <h1>The Haven</h1>
      <p class="subtitle">Valiant Guardian Ministries</p>

      <div class="nav">
        <a href="offering.html">Offering</a>
        <a href="oath.html">Oath</a>
        <a href="forge.html">Forge</a>
        <a href="training-ground.html">Training Ground</a>
        <a href="armory.html">Armory</a>
      </div>

      <footer>© 2026 Valiant Guardian Ministries</footer>

    </div>
  </div>
</body>
</html>
